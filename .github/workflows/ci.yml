name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret
          GROQ_API_KEY: ci-placeholder
